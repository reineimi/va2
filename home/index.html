<!DOCTYPE html><html lang='en'><head><meta charset='utf-8'>
	<meta name='viewport' content='width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover'>
	<title>Home (Va2)</title>
	<meta name='va2meta' content='{"ver": "1.92.104.221"}'>
	<script src='../lib/va2.js' async></script><link rel='stylesheet' href='../lib/va2.css'>
	<style>
		.chatBubble { max-width: 70%; }
		.grad-lt { background: linear-gradient(135deg, var(--accentBg) 0%, var(--windowFg) 60%); }
	</style>
	<script>window.addEventListener('load', ()=>{
	init({proto:0,maximize:0}); // `${}`

	// Local funcs
	{
		va2.data.tshow = va2.data.tshow || {};
		va2.f.tshow = (n)=>{
			va2.data.tshow[n] = va2.data.tshow[n] ? 0 : 1;
			tshow(n);
			va2.f.saveData();
		}
		va2.data.setclass = va2.data.setclass || {};
		va2.data.classes = va2.data.classes || {};
		va2.f.setclass = (id,cl)=>{
			va2.data.setclass[id] = va2.data.setclass[id] ? 0 : 1;
			setclass(id, cl);
			va2.data.classes[id] = emi(id).className;
			va2.f.saveData();
		}
	}

	// Init funcs
	loop(va2.data.tshow, (i,v)=>{ if (v) { tshow(i); } });
	loop(va2.data.classes, (id,v)=>{ if (v) { emi(id).className = v; } });

	// Menu buttons
	{
		mk('va2ctxtItems', `
		<p onclick="tshow('Apps_wrap'); hide('va2ctxt')">
			<gicon class='abs left ml3 fs1-5'>apps</gicon>
			Open app launcher
		</p>
		<p onclick="show('Chat'); hide('va2ctxt'); va2.em.chatBody.scrollTop=va2.em.chatBody.scrollHeight">
			<gicon class='abs left ml3 fs1-5'>tooltip_2</gicon>
			Open chat
		</p>
		<p onclick="windows.openAll(); hide('va2ctxt')">
			<gicon class='abs left ml3 fs1-5'>window</gicon>
			Open all windows
		</p>
		<p onclick="stdin((v)=>{ qem('.imageA')[0].style.backgroundImage='url('+v+')'; `+
		`va2.data.bgurl=v; va2.f.saveData(); }, '<b>Specify image URL</b><br><br>Current: <c>${va2.data.bgurl}</c>')">
			<gicon class='abs left ml3 fs1-5'>image</gicon>
			Change background
		</p>
		<p onclick="va2.f.tshow('Top_menu')">
			<gicon class='abs left ml3 fs1-5'>bottom_panel_open</gicon>
			Hide top panel
		</p>
		<p onclick="va2.f.tshow('Toolbar'); ">
			<gicon class='abs left ml3 fs1-5'>bottom_panel_close</gicon>
			Hide bottom panel
		</p>
		<p onclick="va2.f.setclass('Clocks', 'fgc')">
			<gicon class='abs left ml3 fs1-5'>browse_gallery</gicon>
			Hide clocks background
		</p>
		<p onclick="windows.settings()">
			<gicon class='abs left ml3 fs1-5'>settings</gicon>
			Settings
		</p>`);
	}

	// Chat window
	{
		// Chat input field button
		va2.cl.chbtn = 'btn bbgi b1px fcx fgc bga-hov cwhite-hov gicon mr0 fs1-8 px2 br0';
		// Chat bubble
		va2.cl.chbbl = 'chatBubble py1 px2 bga cwhite brRB0 wbbw break';
		// Chat message date
		va2.cl.chmdt = 'clightgray fs06 pt05 tr';

		// Funcs
		va2.f.msgCtxt = (em)=>{
			ctxt(em, ()=>{
				timeout.set('hide_ctxt', ()=>{ hide('va2ctxt'); }, 0.01);
				popup(`
				<div class='w f'>
					<div class='m my1-g'>
						<p class='btn green cwhite' onclick="copy(emitem(emi('${em.dataset.uid}'), 1).textContent); notify('Text copied', 'green cwhite'); hide('va2popupWrap')">Copy</p>
						<p class='btn skyblue cwhite' onclick="va2.f.chatEdit('${em.dataset.uid}')">Edit</p>
						<p class='btn red cwhite' onclick="rm('${em.dataset.uid}'); va2.f.chatSave(); hide('va2popupWrap')">Delete</p>
					</div>
				</div>`, 'Actions');
			});
		}
		va2.f.chatSave = ()=>{
			va2.data.chatHistory = chat.innerHTML;
			va2.f.saveData();
		}
		va2.f.chatSend = (em, _parseHTML)=>{
			timeout.del('chatEnter');
			if (em.value.match(/[^ \n]+/gm)) {
				const msg = create(0, {
					className: va2.cl.chbbl,
					innerHTML: '<div></div>'
				}, chat);
				msg.dataset.uid = uid('bbl_');
				if (_parseHTML || va2.temp.htmlMode) {
					emitem(msg, 1).innerHTML = em.value;
				} else {
					emitem(msg, 1).textContent = em.value;
				}
				mk(msg, `<p class='${va2.cl.chmdt}'>${timedate()}</p>`);
				body.scrollTop = body.scrollHeight;
				va2.f.msgCtxt(msg); va2.f.chatSave();
			}
			timeout.set('chatEnter', ()=>{em.value = '';}, 0.05);
		};
		va2.f.chatMediaView = (em_or_uid)=>{
			const em = emi(em_or_uid);
			setclass(em, 'fillx', 'bgc', 'z19', 'brS', 'pt1', 'hr40-m');
			setclass(emroot(em), 'z19');
			tshow(bottom);
			scrollto(em);
		};
		va2.f.chatClear = ()=>{
			va2.data.chatHistory = '';
			chat.innerHTML = '';
			va2.f.saveData();
		}
		va2.f.chatEdit = (uid)=>{
			const em = emitem(emi(uid), 1);
			popup(`
			<textarea class='bbgi bgc b1px p1 w hr25'>${em.innerHTML}</textarea>
			<p class='btn mt2' onclick="emitem(emi('${uid}'), 1).innerHTML = emitem(emroot(this), 1).value; hide('va2popupWrap'); va2.f.chatSave()">Save</p>
			`, 'Edit text');
		}

		// Chat area
		const win = windows.add('Chat', 0, {btns:[1,1,0]});
		win[0].id = 'Chat'; hide(win[0]);
		windows.all.pop();
		const body = win[1];
		emprop(body, [['height','calc(100% - 6rem)']]);
		body.dataset.uid = uid();
		body.className = 'grad-lt windowBody w scroll pt2 bgc f';
		va2.em.chatBody = body;
		const chat = create(0, {className:'w m mt0 mr0 fh m-g mr1-g mb1-g g1'}, body);

		// Input area
		const bottom = create(0, {className: 'w f hr3'}, emroot(win[1], 1));

		// Attachments
		const attach = create(0, {
			className: va2.cl.chbtn,
			innerHTML: 'attachment',
			onclick: ()=>{
				getfile((fname,em)=>{
					em.className = 'w ts0 brS pt1 hr40-m';
					em.onclick = ()=>{ va2.f.chatMediaView(em); };
					const wrap = create(0, {className: va2.cl.chbbl}, chat);
					wrap.dataset.uid = uid('bbl_');
					mk(wrap, em);
					mk(wrap, `<p class='${va2.cl.chmdt}'>${timedate()}</p>`);
					body.scrollTo({top: body.scrollHeight, behavior: 'smooth'});
					va2.data.chatHistory = chat.innerHTML;
					va2.f.saveData();
				}, 0, 1);
			}
		}, bottom);

		// Text box
		const inp = create('textarea', {
			className: 'input bbgi f1 br0 fgc hr3',
			placeholder: 'Cats be dancin fr bruv.'
		}, bottom);
		enter(inp, (em)=>{
			if (va2.opt.sendOnEnter) {
				va2.f.chatSend(em);
			}
		});
		ctxt(inp, (e)=>{
			timeout.set('hide_ctxt', ()=>{ hide('va2ctxt'); }, 0.01);
		});

		// Menu with other options
		const theMenu = create('div', {
			innerHTML: 'More options:',
			className: 'abs botR mb5 p2 fgc br b1px bbgi brRB0 mt1-g tc hide ani-expandLT ani015'
		}, bottom);
		const btnMenu = create('p', {
			className: va2.cl.chbtn,
			innerHTML: 'menu',
			title: 'More options',
			onclick: ()=>{ tshow(theMenu); }
		}, bottom);
		body.onclick = ()=>{ hide(theMenu); }
		inp.onclick = ()=>{ hide(theMenu); }

		// Buttons
			// Clear chat
		create('p', {
			className: 'btn cred',
			innerHTML: '<gicon>delete</gicon> Clear history',
			onclick: ()=>{ va2.f.chatClear(); hide(theMenu); }
		}, theMenu);
			// HTML mode button
		create('p', {
			className: 'btn',
			innerHTML: '<gicon>code_blocks</gicon> HTML mode',
			onclick: function(){
				va2.temp.htmlMode ^= 1;
				setclass(this, "cwhite", "bga", "bga-hov");
				// Initial language optimization concerns :^)
				let status = {
					EN: 'Enabled'
				}
				if (!va2.temp.htmlMode) {
					status = {
						EN: 'Disabled'
					}
				}
				notify(`<x class='${va2.opt.lang}'>HTML input mode: ${status[va2.opt.lang]}</x>`,
				'cwhite '+(va2.temp.htmlMode ? 'green' : 'red'), {silent:1});
			}
		}, theMenu);
			// Send On Enter button
		const btnEnter = create('p', {
			className: 'btn',
			innerHTML: '<gicon>subdirectory_arrow_left</gicon> Send on Enter',
			onclick: ()=>{
				va2.opt.sendOnEnter ^= 1;
				setclass(btnEnter, 'cwhite', 'bga', 'bga-hov');
				va2.f.saveData();
				// Initial language optimization concerns :^)
				let status = {
					EN: 'Enabled'
				}
				if (!va2.opt.sendOnEnter) {
					status = {
						EN: 'Disabled'
					}
				}
				notify(`<x class='${va2.opt.lang}'>HTML input mode: ${status[va2.opt.lang]}</x>`,
				'cwhite '+(va2.opt.sendOnEnter ? 'green' : 'red'), {silent:1});
			}
		}, theMenu);
			// Expand input
		create('p', {
			className: 'btn',
			innerHTML: '<gicon>expand_all</gicon> Expand input',
			onclick: ()=>{
				popup(`
				<div class='w f'>
					<textarea class='w vh60 p1 b1px bbgi bgc' data-uid='chat_inp_expanded' placeholder='(HTML parsing enabled)'></textarea>
					<p class='m mt2 btnc' onclick="va2.f.chatSend(emi('chat_inp_expanded'), 1); hide('va2popupWrap')">Send</p>
				</div>`, 'Send message');
				hide(theMenu);
			}
		}, theMenu);

		// Send button
		create('p', {
			className: va2.cl.chbtn,
			innerHTML: 'send',
			onclick: ()=>{ va2.f.chatSend(inp); }
		}, bottom);

		// Init
		chat.innerHTML = va2.data.chatHistory || '';
		loop(qem('.chatBubble'), (_,msg)=>{ va2.f.msgCtxt(msg); });
		loop(qem('.chatBubble > object'), (_,em)=>{
			em.onclick = ()=>{ va2.f.chatMediaView(em); }
			va2.f.msgCtxt(em);
		});
		if (va2.opt.sendOnEnter) {
			setclass(btnEnter, 'cwhite', 'bga', 'bga-hov');
		}
	}

	// App launcher
	{
		/* To-do list:
			ctxt (popup)
			pins (chroot)
			iframe (switch)
		*/
		if (!va2.data.apps) { va2.data.apps = {}; }
		const apps = emi('Apps');
		const site = /http[s]?:\/\/([^\/]+)/;

		// Args: name, url, icon, isIframe, uid, root
		va2.f.newApp = (args)=>{
			if (!args || typeof(args)!=='object') {return 0;}
			// Icon container
			const em = create(0, {
				className: 'wr6 fs08 tc pb4 px1 br b1px bn bfgi-hov wbbw',
			}, args.root || apps);
			const the_uid = args.uid || uid('app_');
			em.dataset.uid = the_uid;
			va2.data.apps[the_uid] = args;
			// Icon
			const icon = create(0, {
				className: 'gicon btn fs2-5 p2 my1 w m0-g c-hov',
				innerHTML: args.icon || 'question_mark'
			}, em);
			if (args.url) {
				if (!args.icon) {
					icon.innerHTML = '';
					icon.className = 'btn bgspan ch5 my1';
					icon.style.backgroundImage = gfavicon(args.url).src;
				}
				if (!args.isIframe) {
					icon.onclick = ()=>{ href(args.url,1); }
				} else {
					icon.onclick = ()=>{
						windows.add(`<a href='${args.url}' target='_blank'>${args.url}</a>`,
						`<iframe class='fill bn br0' src='${args.url}'>`);
						hide('Apps_wrap');
					}
				}
			}
			// Icon name
			let appname = args.name;
			if (args.name) {
				mk(em, "<p class='w abs topL mt6 pt1 px05 nil'>"+args.name+'</p>');
			} else if (args.url && args.url.match(site)) {
				appname = args.url.match(site)[1];
				mk(em, "<p class='w abs topL mt6 pt1 px05 nil'>"+appname+'</p>');
			}
			// Context menu
			ctxt(em, ()=>{
				timeout.set('hide_ctxt', ()=>{ hide('va2ctxt'); }, 0.01);
				popup(`
				<div class='f w'>
					<div class='m mb2 p2 bgc br tl wbbw w1-6-3'>
						<div>name: <p class='c tr right'>${appname}</p></div>
						<div class='f'><p>url:</p> <p class='c tr right pl1 w1-5-4'>${args.url || '-'}</p></div>
						<div>icon: <p class='c tr right'>${args.icon || '-'}</p></div>
						<div>is_iframe: <p class='c tr right'>${args.isIframe || '0'}</p></div>
					</div>
					<p class='w fs1-2'>Actions:</p>
					<div class='m my2 m1-g btn-g br05-g center'>
						<p class='cwhite blue' onclick="stdin((v)=>{ `+
							`va2.data.apps['${the_uid}'].name=v; emitem(emi('${the_uid}'),2).innerHTML=v; va2.f.saveData(); })">Rename</p>
						<p onclick="stdin((v)=>{ `+
							`va2.data.apps['${the_uid}'].url=v; va2.f.saveData(); location.reload(); })">Change URL</p>
						<p onclick="stdin((v)=>{ `+
							`va2.data.apps['${the_uid}'].icon=v; va2.f.saveData(); location.reload(); })">Change icon</p>
						<p onclick="va2.data.apps['${the_uid}'].isIframe^=1; va2.f.saveData(); location.reload()">Re-integrate</p>
						<p class='cwhite red' onclick="va2.f.rmApp('${the_uid}')">Remove</p>
					</div>
				</div>`,
				"Application: <c>"+appname+'</c>');
			});
			va2.f.saveData();
		};

		// Remove app by UID
		va2.f.rmApp = (uid)=>{
			hide('va2popupWrap');
			delete va2.data.apps[uid];
			rm(uid);
			va2.f.saveData();
		}

		// "Add" button
		emi('New_app').onclick = ()=>{
			stdin(
				(args)=>{ va2.f.newApp(args); },
				"Create new application",
				[
					['name', "Application name"],
					['url', "URL address", 'https://...'],
					['icon', "<a href='https://fonts.google.com/icons' target='_blank'>Google Icons</a> (symbol ID, if needed)"],
					['isIframe', "Open in this app? (might not work)", 'yes (?)']
				]
			);
		}

		// Init
		loop(va2.data.apps, (uid,args)=>{
			args.uid = uid;
			va2.f.newApp(args);
		});
	}

	// Task scheduler
	{
		va2.data.tasks = va2.data.tasks || {};
		va2.temp.taskTimers = {};

		// Create window
		const win = windows.add('Tasks', 0, {btns:[1,1,0]});
		win[0].id = 'Tasks'; hide(win[0]);
		windows.all.pop();
		const body = win[1];
		body.className = 'windowBody w scroll pt5 px1 bgc';
		const nav = create(0, {
			className: 'abs topL w hr3 py1 px2 f end fs08',
			innerHTML: "<p class='btn' onclick='va2.f.taskAdd()'>Add</p>"
		}, body);

		// Create new task
		va2.f.taskAdd = (_id, _args)=>{
			const args = _args || {}
			const id = _id || uid('task_');
			const div = create(0, {className: 'w f bT mt1 mb2 fgc shadow'}, body);
			div.dataset.uid = id;
			va2.data.tasks[id] = va2.data.tasks[id] || {};
			const timers = create(0, {className: 'bR f'}, div);

			const dt = create('input', {
				className: 'w0',
				type: 'datetime-local',
				value: args.timer || date('-')+'T'+time(':'),
				onchange: ()=>{
					va2.temp.taskTimers[id] = dt.value;
					va2.data.tasks[id].timer = dt.value;
					va2.f.saveData();
				}
			}, timers);
			va2.temp.taskTimers[id] = dt.value;

			const timer = create(0, {
				className: 'tl fcx btn bgn fgic-hov br0 bR fontCode fs09 fw5 wr7 wbbw',
				onclick: ()=>{ dt.showPicker(); }
			}, timers);
			timer.dataset.uid = id+'_timer';

			const title = create('input', {
				type: 'text',
				className: 'f1 px1 bR bfgi wr5',
				value: args.title || 'Title',
				onblur: function(){
					va2.data.tasks[id].title = this.value;
					va2.f.saveData();
				}
			}, div);

			const more = create('textarea', {
				className: 'w h0 py0 px1 fgc bT',
				value: args.text || '',
				placeholder: '(Task description)',
				onblur: function(){
					va2.data.tasks[id].text = this.value;
					va2.f.saveData();
				}
			});
			const moreBtn = create('p', {
				className: 'btn p2 bgn fgic-hov bn br0 gicon fs1-2',
				innerHTML: 'more_horiz',
				onclick: ()=>{ setclass(more, 'hr25'); }
			}, div);
			mk(div, `<p class='gicon cwhite red fgic-hov px1 py2 fs1-2 pt'
			onclick="rm('${id}'); delete va2.temp.taskTimers['${id}']; delete va2.data.tasks['${id}']; va2.f.saveData()">close</p>`);
			mk(div, more);

			va2.f.saveData();
		}

		// Init
		loop(va2.data.tasks, (id,dt)=>{
			va2.f.taskAdd(id,dt);
		});
		interval.set('task_timers', ()=>{
			loop(va2.temp.taskTimers, (id,t)=>{
				const dif = (new Date(t) - new Date())/1000;
				let s = Math.floor(dif%60);
				if (s < 0) {
					s = s+1;
					addclass(emi(id+'_timer'), 'cred');
				} else {
					rmclass(emi(id+'_timer'), 'cred');
				}
				emi(id+'_timer').innerHTML = '<b>'+
				Math.round(dif/60)+"m</b><p class='fs06 lh1 pt05'>"+t.replace('T',' ')+'</p>';
			});
		}, 1);
	}

	// Creds & other
	{
		mk('va2ctxtMenu', `
		<div class='px2 my2 fcx tc f nowrap g2'>
			<p class='fs08 m'>To clear all the data stored by this web application, head to "Settings" menu and click "<x class='cred'>Erase data</x>".</p>
		</div>
		<hr><div class='center w nosel'>
			<a class='block m mr0 fontX fs1-8 fw3 tc' href='https://github.com/reineimi/va2' target='_blank'>V A <x class='iblock rot90 c ni_x'>I I</x> I I A</a>
			<p class='m mx2'>by</p> <div class='m ml0 ls2'><a class='fs1-6 fontFancy c' href='https://github.com/reineimi' target='_blank'>Reineimi</a></div>
		</div>`);
		timeout.set('timedate', ()=>{ show(emroot('Clocks')); }, 1.05);
		qem('.imageA')[0].style.backgroundImage = `url(${va2.data.bgurl || 'https://files.mastodon.social/media_attachments/files/112/474/022/648/653/867/original/c558545806868f5f.jpg'})`;
		if (Object.entries(va2.data.apps).length < 1) {
			va2.f.newApp({name:'My Page', icon:'logo_dev', url:'https://reineimi.github.io/reineimi/', isIframe:1});
			va2.f.newApp({name:'Va2Box', icon:'deployed_code', url:'https://reineimi.github.io/va2/box/', isIframe:1});
		}
	}
	});</script>
</head>

<body class='ts-all' spellcheck='false'>
	<div class='imageA fill bgspan bgc zn1 nosel nil o06'></div>
	<main id='Main' class='h spx'>
		<!-- Top right buttons -->
		<div id='Top_menu' class='w f fix topR mt1 mr1'>
			<div class='m mr0 center fgc br py1 px2 g2'>
				<p class='btn_notifs gicon c-hov pt fs2' onclick='notifs.show()'>notifications</p>
				<p class='gicon c-hov pt fs2' onclick='show("va2ctxt")'>menu</p>
			</div>
		</div>
		<!-- Clocks -->
		<div class='w abs topL mt6 zn1 tc cmax fontCode f nosel nil hide'>
			<div id='Clocks' class='m px3 pb2 pt1 br fgc'>
				<div class='time fs4'></div>
				<div class='date fs1-4 my05'></div>
				<div>
					Session time: <x class='elapsed'></x>
				</div>
			</div>
		</div>
		<!-- Toolbar (bottom panel) -->
		<div class='abs botL w f mb2 zn1'>
			<div class='fill zn1' onclick='hide("Apps_wrap")'></div>
			<div id='Toolbar' class='m f p2 br bgc f g1'>
				<p class='gicon btn fs1-6 p2' onclick="tshow('Chat'); va2.em.chatBody.scrollTop=va2.em.chatBody.scrollHeight">tooltip_2</p>
				<p class='gicon btn fs1-6 p2' onclick="tshow('Apps_wrap')">apps</p>
				<p class='gicon btn fs1-6 p2' onclick="tshow('Tasks')">ballot</p>
			</div>
		</div>
		<!-- App launcher -->
		<div id='Apps_wrap' class='fillx f spx pt1 pb7 nil z2 hide'>
			<div class='int w h f p1 scroll fgc br ani03 ani-slideFromB'>
				<div id='Apps' class='m center mx0-g g05 nosel'>
					<div class='wr6 fs08 tc pb4 px1 br b1px bn bfgi-hov wbbw'>
						<p data-uid='New_app' class='gicon btn fs2-5 p2 my1 w'>add</p>
						<p class='w abs topL mt6 pt1 px05 nil'>Add</p>
					</div>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
