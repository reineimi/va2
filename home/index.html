<!DOCTYPE html><html lang='en'><head><meta charset='utf-8'>
	<meta name='viewport' content='width=device-width, height=device-height, initial-scale=1.0, viewport-fit=cover'>
	<title>Home (Va2)</title>
	<meta name='va2meta' content='{"ver": "1.89.97.211"}'>
	<!-- --<script src='va2/lib/va2.js' async></script><link rel='stylesheet' href='va2/lib/va2.css'><!-- -->
	<!-- -->
	<script src='https://reineimi.github.io/va2/lib/va2.js' async></script>
	<link rel='preload' href='https://reineimi.github.io/va2/lib/va2.css' as='style' onload='this.onload=null;this.rel="stylesheet"'>
	<noscript><link rel='stylesheet' href='https://reineimi.github.io/va2/lib/va2.css'></noscript>
	<link rel='preconnect' href='https://reineimi.github.io/va2/lib/va2.css'><!-- -->
	<style>
	.chatBubble { max-width: 60%; }
	.windowBody { height: calc(100% - 6rem) !important; }
	</style>
	<script>window.addEventListener('load', ()=>{
	init({proto:0,maximize:0});

	// Local funcs
	{
		va2.f.lang = ()=>{
			if (va2.opt.lang === 'EN') { va2lang('RU'); }
			else if (va2.opt.lang === 'RU') { va2lang('EN'); }
			va2.f.saveData();
		}
		va2.data.tshow = va2.data.tshow || {};
		va2.f.tshow = (n)=>{
			va2.data.tshow[n] = va2.data.tshow[n] ? 0 : 1;
			tshow(n);
			va2.f.saveData();
		}
		va2.data.setclass = va2.data.setclass || {};
		va2.data.classes = va2.data.classes || {};
		va2.f.setclass = (id,cl)=>{
			va2.data.setclass[id] = va2.data.setclass[id] ? 0 : 1;
			setclass(id, cl);
			va2.data.classes[id] = emi(id).className;
			va2.f.saveData();
		}
	}

	// Init funcs
	loop(va2.data.tshow, (i,v)=>{ if (v) { tshow(i); } });
	loop(va2.data.classes, (id,v)=>{ if (v) { emi(id).className = v; } });

	// Menu buttons
	{
		mk('va2ctxtItems', `
		<p onclick="show('Apps_wrap'); hide('va2ctxt')">
			<gicon class='abs left ml3 fs1-5'>apps</gicon>
			<x class='EN'>Open app launcher</x>
			<x class='RU'>Открыть лаунчер</x>
		</p>
		<p onclick="show('Chat'); hide('va2ctxt'); va2.em.chatBody.scrollTop=va2.em.chatBody.scrollHeight">
			<gicon class='abs left ml3 fs1-5'>tooltip_2</gicon>
			<x class='EN'>Open chat</x>
			<x class='RU'>Открыть чат</x>
		</p>
		<p onclick="windows.openAll(); hide('va2ctxt')">
			<gicon class='abs left ml3 fs1-5'>window</gicon>
			<x class='EN'>Open all windows</x>
			<x class='RU'>Открыть все окна</x>
		</p>
		<p onclick="stdin((v)=>{ qem('.imageA')[0].style.backgroundImage='url('+v+')'; va2.data.bgurl=v; va2.f.saveData(); }, 'Image URL:')">
			<gicon class='abs left ml3 fs1-5'>image</gicon>
			<x class='EN'>Change background</x>
			<x class='RU'>Сменить фон</x>
		</p>
		<p onclick="va2.f.tshow('Top_menu')">
			<gicon class='abs left ml3 fs1-5'>bottom_panel_open</gicon>
			<x class='EN'>Hide top panel</x>
			<x class='RU'>Скрыть верхнюю панель</x>
		</p>
		<p onclick="va2.f.tshow('Toolbar'); ">
			<gicon class='abs left ml3 fs1-5'>bottom_panel_close</gicon>
			<x class='EN'>Hide bottom panel</x>
			<x class='RU'>Скрыть нижнюю панель</x>
		</p>
		<p onclick="va2.f.setclass('Clocks', 'fgc')">
			<gicon class='abs left ml3 fs1-5'>browse_gallery</gicon>
			<x class='EN'>Hide clocks background</x>
			<x class='RU'>Скрыть фон у часов</x>
		</p>
		<p onclick="windows.settings()">
			<gicon class='abs left ml3 fs1-5'>settings</gicon>
			<x class='EN'>Settings</x>
			<x class='RU'>Настройки</x>
		</p>`);
	}

	/* "Add" button
	create(0, {
		className: 'gicon',
		innerHTML: 'add',
		onclick: function(){
			hide(emroot(this,3));
			stdin((url)=>{
				timeout.set('new_link', ()=>{
					stdin((name)=>{
						mk('va2ctxtItems', `<a href='${url}' target='_blank'>${gfavicon(url)} ${name}</a>`);
					},"<x class='EN'>Specify a <c>name</c> for the new button</x>"+
					"<x class='RU'>Укажите <c>имя</c> для вашей ссылки</x>.");
				}, 0.15);
			},"<x class='EN'>Specify a <c>URL address</c> for the new button</x>"+
			"<x class='RU'>Укажите <c>URL адрес</c> для новой кнопки</x>.");
		}
	}, 'va2ctxtItems'); //*/

	// Time/date
	timeout.set('timedate', ()=>{ show(emroot('Clocks')); }, 1.05);

	// Chat window
	{
		// Chat bubble
		va2.cl.chbbl = 'chatBubble py1 px2 fgc bfgi b1px brRB0 wbbw break';
		// Chat input field button
		va2.cl.chbtn = 'btn fgc bbgi fcx gicon bga-hov cwhite-hov mr0 fs1-8 px2 br0';

		// Funcs
		va2.f.chatSend = (em)=>{
			timeout.del('chatEnter');
			if (em.value.match(/[a-zA-Z0-9]+/gm)) {
				const p = create('p', {className: va2.cl.chbbl}, chat);
				if (va2.temp.htmlMode) {
					p.innerHTML = em.value;
				} else {
					p.textContent = em.value;
				}
				body.scrollTop = body.scrollHeight;
				va2.data.chatHistory = chat.innerHTML;
				va2.f.saveData();
			}
			timeout.set('chatEnter', ()=>{em.value = '';}, 0.05);
			if (em.value.match('chat.clear')) { va2.f.chatClear(); }
		};
		va2.f.chatMediaView = function(em_or_uid){
			const em = emi(em_or_uid);
			setclass(em, 'fillx', 'black', 'z19', 'brRB0', 'bfgi');
			tshow(bottom);
			scrollto(em);
		};
		va2.f.chatClear = ()=>{
			va2.data.chatHistory = '';
			chat.innerHTML = '';
			va2.f.saveData();
		}

		// Chat area
		const win = windows.add('<x class="EN">Chat</x><x class="RU">Чат</x>', 0, {btns:[1,1,0]});
		win[0].id = 'Chat'; hide(win[0]);
		windows.all.pop();
		const body = win[1];
		body.dataset.uid = uid();
		body.className = 'windowBody w scroll pt2 bgc f';
		va2.em.chatBody = body;
		const chat = create(0, {className:'w m mb0 mr0 fh m-g mr1-g mb1-g g1'}, body);

		// Input area
		const bottom = create(0, {className: 'w f hr3 bT'}, emroot(win[1], 1));

		// Attachments
		const attach = create(0, {
			className: va2.cl.chbtn,
			innerHTML: 'attachment',
			onclick: ()=>{
				getfile((fname,em)=>{
					em.className = va2.cl.chbbl;
					em.onclick = ()=>{ va2.f.chatMediaView(em); };
					mk(chat, em);
					body.scrollTo({top: body.scrollHeight, behavior: 'smooth'});
					va2.data.chatHistory = chat.innerHTML;
					va2.f.saveData();
				}, 0, 1);
			}
		}, bottom);

		// Text box
		const inp = create('textarea', {
			className: 'input bbgi f1 br0 fgc hr3',
			placeholder: 'Cats be dancin fr bruv.'
		}, bottom);
		enter(inp, (em)=>{
			if (va2.opt.sendOnEnt) {
				va2.f.chatSend(em);
			}
		});

		// HTML mode button
		mk(bottom, `<p class='${va2.cl.chbtn} px1' onclick='va2.temp.htmlMode ^= 1; setclass(this, "cwhite", "bga")'>code_blocks</p>`);
		// Send On Enter button
		const btnEnter = create('p', {
			className: va2.cl.chbtn+' px1',
			innerHTML: 'subdirectory_arrow_left',
			onclick: ()=>{
				va2.opt.sendOnEnt ^= 1;
				setclass(btnEnter, 'cwhite', 'bga');
				va2.f.saveData();
			}
		}, bottom);

		// Send button
		create('p', {
			className: va2.cl.chbtn,
			innerHTML: 'send',
			onclick: ()=>{ va2.f.chatSend(inp); }
		}, bottom);

		// Init
		chat.innerHTML = va2.data.chatHistory || '';
		loop(qem('object'), (_,em)=>{
			em.onclick = ()=>{ va2.f.chatMediaView(em); }
		});
		if (va2.opt.sendOnEnt) {
			setclass(btnEnter, 'cwhite', 'bga');
		}
	}

	// App launcher
	{
		/* To-do list:
			ctxt (popup)
			pins (chroot)
			iframe (switch)
		*/
		if (!va2.data.apps) { va2.data.apps = {}; }
		const apps = emi('Apps');
		const site = /http[s]?:\/\/([^\/]+)/;

		// Args: name, url, icon, isIframe, uid, root
		va2.f.newApp = (args)=>{
			if (!args || typeof(args)!=='object') {return 0;}
			// Icon container
			const em = create(0, {
				className: 'wr6 fs08 tc pb4 px1 br b1px bn bfgi-hov wbbw',
			}, args.root || apps);
			em.dataset.uid = args.uid || uid('app_');
			va2.data.apps[em.dataset.uid] = args;
			// Icon
			const icon = create(0, {
				className: 'gicon btn fs2-5 p2 my1 w',
				innerHTML: args.icon || 'question_mark'
			}, em);
			if (args.url) {
				icon.innerHTML = gfavicon(args.url);
				if (!args.isIframe) {
					icon.onclick = ()=>{ href(args.url,1); }
				} else {
					icon.onclick = ()=>{
						windows.add(args.url,
						`<iframe class='w h bn' src='${args.url}'>`);
					}
				}
			}
			// Icon name
			if (args.name) {
				mk(em, "<p class='w abs topL mt6 pt1 px05 nil'>"+args.name+'</p>');
			} else if (args.url && args.url.match(site)) {
				mk(em, "<p class='w abs topL mt6 pt1 px05 nil'>"+args.url.match(site)[1]+'</p>');
			}
			// Context menu
			ctxt(em, ()=>{
				
			});
		};

		// Init
		loop(va2.data.apps, (uid,args)=>{
			args.uid = uid;
			va2.f.newApp(args);
		});
	}

	// Creds & other
	{
		mk('va2ctxtMenu', `
		<div class='px2 my2 fcx tc f nowrap g2'>
			<p class='EN fs08 m'>To clear all the data stored by this web application, head to "Settings" menu and click "<x class='cred'>Erase data</x>".</p>
			<p class='RU fs08 m'>Для того, чтобы очистить все данные данного веб приложения, перейдите в меню "Настройки" и нажмите "<x class='cred'>Erase data</x>".</p>
			<p class='m btn p1 gicon fcx c-hov pt fs2' onclick='va2.f.lang()'>language_japanese_kana</p>
		</div>
		<hr><div class='center w nosel'>
			<a class='block m mr0 fontX fs1-8 fw3 tc' href='https://github.com/reineimi/va2' target='_blank'>V A <x class='iblock rot90 c ni_x'>I I</x> I I A</a>
			<p class='m mx2'>by</p> <div class='m ml0 ls2'><a class='fs1-6 fontFancy c' href='https://github.com/reineimi' target='_blank'>Reineimi</a></div>
		</div>`);
		qem('.imageA')[0].style.backgroundImage = `url(${va2.data.bgurl || 'https://files.mastodon.social/media_attachments/files/112/474/022/648/653/867/original/c558545806868f5f.jpg'})`;

		va2.f.newApp({name:'reineimi', url:'https://reineimi.github.io/reineimi/', isIframe:1});
		va2.f.newApp({name:'Va2box', url:'https://reineimi.github.io/va2/va2box/', isIframe:1});
	}
	});</script>
</head>

<body class='ts-all'>
	<div class='imageA fill bgspan bgc zn1 nosel nil o05'></div>
	<main id='Main' class='h spx'>
		<!-- Top right buttons -->
		<div id='Top_menu' class='w f fix topR mt1 mr1'>
			<div class='m mr0 center fgc br py1 px2 g2'>
				<!-- <p class='gicon c-hov pt fs2' onclick='fullscreen()'>fullscreen</p>
				<p class='gicon c-hov pt fs2' onclick='themeset()'>contrast</p> -->
				<p class='btn_notifs gicon c-hov pt fs2' onclick='notifs.show()'>notifications</p>
				<p class='gicon c-hov pt fs2' onclick='show("va2ctxt")'>menu</p>
			</div>
		</div>
		<!-- Clocks -->
		<div class='w abs topL mt6 zn1 tc cmax fontCode f nosel nil hide'>
			<div id='Clocks' class='m px3 pb2 pt1 br fgc'>
				<div class='time fs4'></div>
				<div class='date fs1-4 my05'></div>
				<div>
					<x class='EN'>Session time</x>
					<x class='RU'>Время сессии</x>
					: <x class='elapsed'></x>
				</div>
			</div>
		</div>
		<!-- Toolbar (bottom panel) -->
		<div class='abs botL w f mb2 zn1'>
			<div class='fill zn1' onclick='hide("Apps_wrap")'></div>
			<div id='Toolbar' class='m f p2 br bgc f g1'>
				<p class='gicon btn fs1-6 p2' onclick="tshow('Chat'); va2.em.chatBody.scrollTop=va2.em.chatBody.scrollHeight">tooltip_2</p>
				<p class='gicon btn fs1-6 p2' onclick="tshow('Apps_wrap')">apps</p>
			</div>
		</div>
		<!-- App launcher -->
		<div id='Apps_wrap' class='fillx f spx pt1 pb7 nil hide'>
			<div class='int w h f p1 scroll fgc br ani03 ani-slideFromB'>
				<div id='Apps' class='m center mx0-g g05 nosel'>
					<div class='wr6 fs08 tc pb4 px1 br b1px bn bfgi-hov wbbw'>
						<p class='gicon btn fs2-5 p2 my1 w' onclick="popup(`<x class='EN'>Currently under development.</x><x class='RU'>Пока в процессе разработки.</x>`)">add</p>
						<p class='w abs topL mt6 pt1 px05 nil'>
							<x class='EN'>Add</x>
							<x class='RU'>Добавить</x>
						</p>
					</div>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
